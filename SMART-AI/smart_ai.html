  const yTaniExtra=!yTaniInDB&&item.chumon_yoryo_tani?`<option value="${h(item.chumon_yoryo_tani)}" selected>⚠${h(item.chumon_yoryo_tani)}</option>`:'';

  // ---- 消費税率（マスタから取得：8%/10%。ドロップダウンで変更可）----
  const taxOpts=[8,10].map(t=>`<option value="${t}"${(item.shouhizei||8)==t?' selected':''}>${t}%</option>`).join('');
  const taxSelect=`<select class="xl-cell xl-tax" onchange="updateField(${idx},'shouhizei',parseInt(this.value))">${taxOpts}</select>`;

  // ---- 操作 ----
  // マスタ未登録 → 「マスタ登録」主アクション。
  // マスタ一致 → 「確認」主アクション ＋ 別途マスタ登録したいケース用のアイコンボタン。
  const missing=getMissingFields(item);
  const miss=new Set(missing.map(m=>m.key));
  const missLabels=missing.map(m=>m.label).join('・');
  let actCell;
  if(isHold){
    actCell=`<button class="xl-btn reg" onclick="openMasterModal(${idx})" title="原体マスターに登録する"><i class="ti ti-database-plus" style="font-size:14px;"></i>マスタ登録</button>`;
  }else if(missing.length>0){
    actCell=`<div class="xl-act-grp">
      <button class="xl-btn err" disabled title="未入力: ${missLabels}"><i class="ti ti-alert-triangle" style="font-size:14px;"></i>要入力</button>
      <button class="xl-btn ico" onclick="openMasterModal(${idx})" title="この内容でマスタにも登録"><i class="ti ti-database-plus" style="font-size:15px;"></i></button>
    </div>`;
  }else{
    actCell=`<div class="xl-act-grp">
      <button class="xl-btn confirm" onclick="confirmItem(${idx})"><i class="ti ti-check" style="font-size:14px;"></i>確認</button>
      <button class="xl-btn ico" onclick="openMasterModal(${idx})" title="この内容でマスタにも登録"><i class="ti ti-database-plus" style="font-size:15px;"></i></button>
    </div>`;
  }

  return `<tr class="r${isHold?' hold':''}${S._moveFlash===idx?' move-flash':''}" data-idx="${idx}">
    <td class="xl-rail ${railClass}"></td>
    <td class="xl-rownum"><span class="rn-num">${rowNo}</span><div class="rn-tools">
      <span class="rn-grip" data-idx="${idx}" title="ドラッグで移動"><i class="ti ti-grip-vertical"></i></span>
      <button class="rn-del" onclick="deleteRow(${idx})" title="削除"><i class="ti ti-trash"></i></button>
    </div></td>
    <td>${genkeiCell}</td>
    <td><input class="xl-cell" value="${h(item.sanchi||'')}" onchange="updateField(${idx},'sanchi',this.value)"/></td>
    <td>${keijouCell}</td>
    <td><div class="xl-combo seamless">
      <input class="xl-cell num" type="number" value="${item.irisu_suryo||''}" placeholder="任意" onchange="updateField(${idx},'irisu_suryo',this.value?parseFloat(this.value):null)"/>
      <select class="xl-cell" onchange="updateField(${idx},'irisu_tani',this.value)">${irisuTaniOpts}</select>
    </div></td>
    <td><div class="xl-combo seamless">
      <input class="xl-cell num${miss.has('suryo')?' xl-err':''}" type="number" placeholder="必須" value="${item.suryo||''}" onchange="updateField(${idx},'suryo',parseFloat(this.value)||0)"/>
      <select class="xl-cell${miss.has('tani')?' xl-err':(!taniInDB&&item.tani?' nondb':'')}" onchange="updateField(${idx},'tani',this.value)">${taniExtra}${taniOpts}</select>
    </div></td>
    <td><div class="xl-combo seamless">
      <input class="xl-cell num${miss.has('chumon_yoryo')?' xl-err':''}" type="number" value="${item.chumon_yoryo||1}" onchange="updateField(${idx},'chumon_yoryo',parseFloat(this.value)||1)"/>
      <select class="xl-cell${!yTaniInDB&&item.chumon_yoryo_tani?' nondb':''}" onchange="updateField(${idx},'chumon_yoryo_tani',this.value)">${yTaniExtra}${yTaniOpts}</select>
    </div></td>
    <td><input class="xl-cell num${miss.has('kakaku')?' xl-err':''}" type="number" placeholder="必須" value="${item.kakaku||''}" onchange="updateField(${idx},'kakaku',parseInt(this.value)||0)"/></td>
    <td>${taxSelect}</td>
    <td><span class="xl-amt${item.amountMismatch?' warn':''}${item._pulse?' pulse':''}">¥${(item.kingaku||0).toLocaleString()}</span></td>
    <td class="xl-act">${actCell}</td>
  </tr>`;
}

/* =========================================================================
   グリッド操作
   ========================================================================= */
function toggleSelectAll(checked){document.querySelectorAll('.row-chk').forEach(c=>c.checked=checked);}
function getSelectedIdxs(){return[...document.querySelectorAll('.row-chk:checked')].map(c=>parseInt(c.dataset.idx));}

// 原体マスターを割り当て（ドロップダウンから選択）→ 一致状態にする
function assignMaster(idx,val){
  const it=S.items[idx];
  if(!val){ it.shohintaiko=null; render(); return; }  // 未選択に戻す＝保留
  const sh=M.shohintaiko.find(s=>s.id==val);
  if(sh){
    it.shohintaiko={id:sh.id,name:sh.name};
    it.genkei=sh.name;
    // マスター既定値で空欄を補完（人が後から変更可能）
    if(!it.tani)it.tani=sh.tani;
    if(!it.kakaku||it.kakaku<=0){it.kakaku=sh.kakaku;it.priceFromMaster=true;recalc(it);}
    if((!it.keijou||it.keijou==='-')&&sh.kigo)it.keijou=sh.kigo;
    it.confidence='high';
  }
  render();
}

// 一致した行（必須項目が揃っているもの）を一括確認
function bulkConfirmReady(){
  S.items.forEach((it,i)=>{
    if(!it._deleted&&!S.confirmed[i]&&it.shohintaiko&&getMissingFields(it).length===0)S.confirmed[i]=true;
  });
  renderFlip();
}

// 選択行を一括確認（マスター一致のみ）
function bulkConfirmSelected(){
  getSelectedIdxs().forEach(idx=>{
    const it=S.items[idx];
    if(!S.confirmed[idx]&&it.shohintaiko&&getMissingFields(it).length===0)S.confirmed[idx]=true;
  });
  render();
}

/* =========================================================================
   原体マスター登録モーダル
   実際の「原体登録」画面と同じ仕様：
   - ID は自動採番（入力不要）
   - 読み/JAN は空欄でOK（任意）
   - 原体名は今回読み取った値が自動で入る
   → 「追加」を押すだけでマスター登録 → その行が自動で一致状態になる
   ========================================================================= */
function openMasterModal(idx){
  S.masterModal=idx;render();
}
function closeMasterModal(){S.masterModal=null;render();}

function masterModal(){
  if(S.masterModal==null)return'';
  const idx=S.masterModal;
  const it=S.items[idx];
  const nm=it.genkei||it.suggestedName||'';
  // 次のIDを自動採番（既存最大+1）
  const nextId=Math.max(0,...M.shohintaiko.map(s=>s.id))+1;
  return `<div class="mm-overlay" onclick="if(event.target===this)closeMasterModal()">
    <div class="mm-box" data-idx="${idx}" data-nextid="${nextId}">
      <div class="mm-head">
        <div class="mm-title"><i class="ti ti-leaf" style="font-size:18px;color:var(--g);"></i> 原体登録</div>
        <button class="mm-close" onclick="closeMasterModal()"><i class="ti ti-x" style="font-size:20px;"></i></button>
      </div>
      <div class="mm-body">
        <div class="mm-grid">
          <div class="mm-field" style="flex:0 0 90px;">
            <label>ID<span class="mm-auto">自動</span></label>
            <input class="mm-inp" value="${nextId}" disabled/>
          </div>
          <div class="mm-field" style="flex:1;">
            <label>原体名 <span class="mm-req">必須</span></label>
            <input class="mm-inp" id="mm-name" value="${h(nm)}" placeholder="例：長芋"/>
          </div>
          <div class="mm-field" style="flex:1;">
            <label>読み / JAN<span class="mm-opt">任意</span></label>
            <input class="mm-inp" id="mm-yomi" placeholder="空欄でOK"/>
          </div>
        </div>
        <div class="mm-note"><i class="ti ti-info-circle" style="font-size:13px;"></i> 読み取った商品名がそのまま登録されます。IDは自動採番、読み/JANは後から編集できます。</div>
      </div>
      <div class="mm-foot">
        <button class="btn btn-ghost" style="height:42px;" onclick="closeMasterModal()">キャンセル</button>
        <button class="btn btn-primary" style="height:42px;font-size:15px;" onclick="saveMasterFromModal(${idx},${nextId})"><i class="ti ti-plus" style="font-size:16px;"></i> 追加</button>
      </div>
    </div>
  </div>`;
}

function saveMasterFromModal(idx,nextId){
  const it=S.items[idx];
  const name=($id('mm-name')?.value||'').trim();
  const yomi=($id('mm-yomi')?.value||'').trim();
  if(!name){alert('原体名を入力してください');return;}
  // 原体マスターに新規登録（管理者の登録画面と同じデータ構造）
  const np={id:nextId,name:name,kigo:'',tani:it.tani||'ケース',genkei:name,kakaku:it.kakaku||0,jan:yomi,yomi:yomi};
  M.shohintaiko.push(np);
  // この行を即座に一致状態にする
  it.shohintaiko={id:np.id,name:np.name};
  it.genkei=name;
  it.confidence='high';
  it._justRegistered=true; // 「新規登録済み」表示用フラグ
  S.masterModal=null;
  // 必須が揃っていれば自動で確認済みにはしない（人が最終確認）
  render();
}

function recalc(it){
  const y=it.chumon_yoryo||1;
  it.kingaku=y>1?(it.suryo||0)*(it.kakaku||0)*y:(it.suryo||0)*(it.kakaku||0);
}

/* =========================================================================
   行の手動挿入・削除
   AIが読み飛ばした明細を、資料の正しい位置にその場で追加できる。
   ========================================================================= */
function insertZone(at){
  return `<tr class="xl-ins"><td colspan="12"><div class="ins-line"><span class="ins-pill" onclick="insertRow(${at})" title="ここに行を挿入"><i class="ti ti-plus" style="font-size:14px;"></i></span></div></td></tr>`;
}

function insertRow(at){
  const blank={
    original:'(手動追加)',hizuke:'',jan_code:'',shohintaiko:null,
    genkei:'',suggestedName:'',sanchi:'',keijou:'-',suryo:1,tani:'ケース',
    chumon_yoryo:1,chumon_yoryo_tani:'kg',kakaku:0,priceFromMaster:false,
    kingaku:0,amountMismatch:false,irisu_suryo:null,irisu_tani:'',
    shouhizei:8,confidence:'none',field_confidence:{},_manual:true
  };
  S.items.splice(at,0,blank);
  // confirmed のインデックスを at 以降 +1 シフト
  const nc={};
  Object.keys(S.confirmed).forEach(k=>{const i=parseInt(k);nc[i>=at?i+1:i]=S.confirmed[k];});
  S.confirmed=nc;
  render();
  // 挿入した行の原体入力にフォーカス
  setTimeout(()=>{const r=document.querySelector(`tr[data-idx="${at}"] select, tr[data-idx="${at}"] input`);if(r)r.focus();},50);
}

function deleteRow(idx){
  // 論理削除（復活可能）：配列から消さず _deleted フラグを立てる。
  // → インデックスがずれず、フィルタ「削除済み」で見て復活できる。
  const doDelete=()=>{
    S.items[idx]._deleted=true;
    delete S.confirmed[idx];
    renderFlip();
  };
  const el=document.querySelector(`tr.r[data-idx="${idx}"]`)||document.querySelector(`.mc-wrap[data-idx="${idx}"]`);
  if(el){el.classList.add('row-collapse');setTimeout(doDelete,280);}
  else{doDelete();}
}
function restoreRow(idx){
  S.items[idx]._deleted=false;
  S._moveFlash=idx;
  render();
}

// 行をドラッグで任意位置へ移動（from → to に挿入）。confirmed状態も追従。
function reorderRow(from,to){
  if(from===to||from<0||to<0||from>=S.items.length)return;
  // confirmedをアイテムに添付して並べ替え、再構築
  const arr=S.items.map((it,i)=>({it,done:!!S.confirmed[i]}));
  const [moved]=arr.splice(from,1);
  // from削除後の to を補正
  const insertAt=to>from?to-1:to;
  arr.splice(insertAt,0,moved);
  S.items=arr.map(o=>o.it);
  S.confirmed={};
  arr.forEach((o,i)=>{if(o.done)S.confirmed[i]=true;});
  S._moveFlash=insertAt;
  render();
}

function updateField(idx,key,value){
  const it=S.items[idx];
  it[key]=value;
  if(['suryo','kakaku','chumon_yoryo'].includes(key)){recalc(it);it.amountMismatch=false;it._pulse=true;}
  render();
}

function confirmItem(idx){
  const it=S.items[idx];
  if(!it.shohintaiko)return;               // マスタ未登録は確認不可
  if(getMissingFields(it).length>0)return; // 必須未入力は確認不可
  const el=document.querySelector(`tr.r[data-idx="${idx}"]`)||document.querySelector(`.mc[data-idx="${idx}"]`);
  if(el){el.classList.add('confirm-flash');setTimeout(()=>{S.confirmed[idx]=true;renderFlip();},360);}
  else{S.confirmed[idx]=true;render();}
}
function unconfirm(idx){delete S.confirmed[idx];render();}

// ステータスバッジによるフィルタ切替（同じものを再度押すと解除）
function setFilter(f){
  S.filter=(S.filter===f)?null:f;
  render();
}

function proceedToRegister(ev){
  // 安全ガード：保留・未確認が残っていたら登録させない（ボタンは無効化済みだが二重防御）
  // 削除済み(_deleted)は対象外として除外する
  const holdCount=S.items.filter((it,i)=>!it._deleted&&!S.confirmed[i]&&!it.shohintaiko).length;
  const matchCount=S.items.filter((it,i)=>!it._deleted&&!S.confirmed[i]&&it.shohintaiko).length;
  const doneCount=S.items.filter((it,i)=>!it._deleted&&S.confirmed[i]).length;
  if(holdCount>0||matchCount>0||doneCount===0){S._armRegister=false;render();return;}

  // 最終確認は2タップ方式（ネイティブのconfirmは一部のWebViewで抑制されるため使わない）
  if(!S._armRegister){
    S._armRegister=true;render();
    // 一定時間操作がなければ解除
    clearTimeout(window._armTimer);
    window._armTimer=setTimeout(()=>{if(S._armRegister){S._armRegister=false;render();}},4000);
    return;
  }
  // 2回目のタップ＝確定
  S._armRegister=false;
  clearTimeout(window._armTimer);

  // 確認済みのみを発注データ化。送信演出を挟む。
  const btn=ev&&ev.currentTarget?ev.currentTarget:document.querySelector('.xl-submit');
  const confirmedRows=[...document.querySelectorAll('tr.r.done, .mc.done')];
  if(!btn){saveToHistory();S.step=4;S._step4celebrate=true;render();return;}
  const br=btn.getBoundingClientRect();
  const target={x:br.left+br.width/2,y:br.top+br.height/2};
  // 確認済み各行から、緑の粒子がボタンへ吸い込まれる
  const fly=document.createElement('div');fly.className='fly-layer';document.body.appendChild(fly);
  const srcs=confirmedRows.length?confirmedRows.slice(0,30):[document.querySelector('.xl-scroll,.mc-list')].filter(Boolean);
  let n=0;
  srcs.forEach((row,i)=>{
    const rr=row.getBoundingClientRect();
    const p=document.createElement('div');p.className='fly-dot';
    p.style.left=(rr.left+rr.width*0.5)+'px';p.style.top=(rr.top+rr.height/2)+'px';
    fly.appendChild(p);
    requestAnimationFrame(()=>{
      p.style.transition=`transform .55s cubic-bezier(.5,0,.3,1) ${i*0.04}s, opacity .55s ease ${i*0.04}s`;
      p.style.transform=`translate(${target.x-(rr.left+rr.width*0.5)}px,${target.y-(rr.top+rr.height/2)}px) scale(0.3)`;
      p.style.opacity='0.2';
    });
    n=i;
  });
  btn.classList.add('xl-submit-loading');
  btn.innerHTML='<span class="xl-spin"></span> 登録中…';
  // 粒子到達後にボタンがパルスして次画面へ
  const delay=300+Math.min(n,15)*40+450;
  setTimeout(()=>{btn.classList.add('xl-submit-burst');},delay-200);
  setTimeout(()=>{fly.remove();saveToHistory();S.step=4;S._step4celebrate=true;render();},delay);
}

// ===== 登録履歴（過去に登録した注文書の一覧） =====
function saveToHistory(){
  const items=S.items.filter((it,i)=>!it._deleted&&S.confirmed[i]);
  if(!items.length)return;
  const total=items.reduce((s,it)=>s+(it.kingaku||0),0);
  const now=new Date();
  const entry={
    id:'h'+now.getTime(),
    ts:now.getTime(),
    dateStr:`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    fileName:S.file?S.file.name:(S.text?'テキスト入力':'(ファイルなし)'),
    torihiki:S.torihiki?.name||'—',
    nohin:S.nohin?.name||'—',
    nohinbi:S.nohinbi,
    count:items.length,
    total,
    lines:items.map(it=>({name:it.genkei,sanchi:it.sanchi||'',keijou:it.keijou||'-',suryo:it.suryo,tani:it.tani||'',kakaku:it.kakaku||0,kingaku:it.kingaku||0}))
  };
  S.history.unshift(entry); // 新しい順
  // ブラウザに永続化（使えない環境ではセッション内のみ・エラーにしない）
  try{localStorage.setItem('smartorder_history',JSON.stringify(S.history.slice(0,200)));}catch(e){}
}
function loadHistory(){
  try{const raw=localStorage.getItem('smartorder_history');if(raw)S.history=JSON.parse(raw)||[];}catch(e){S.history=[];}
}
function openHistory(){S.showHistory=true;S._histExpand=null;render();}
function closeHistory(){S.showHistory=false;render();}
function toggleHistDetail(id){S._histExpand=(S._histExpand===id)?null:id;render();}
function deleteHistory(id){
  S.history=S.history.filter(e=>e.id!==id);
  try{localStorage.setItem('smartorder_history',JSON.stringify(S.history.slice(0,200)));}catch(e){}
  render();
}

/* =========================================================================
   ローディング画面
   ========================================================================= */
function loadingScreen(){
  const ph=S.loadingPhase.includes('画像')||S.loadingPhase.includes('OCR')||S.loadingPhase.includes('Vision')?'ocr':S.loadingPhase.includes('照合')||S.loadingPhase.includes('抽出')?'match':'read';
  const steps=[{k:'read',lbl:'ファイルを準備中'},{k:'ocr',lbl:'AIが画像内容を解析中'},{k:'match',lbl:'商品台帳・産地・形状を抽出中'}];
  return `<div class="card loading-wrap">
    <div class="ld-dots"><span></span><span></span><span></span></div>
    <div class="loading-title">${h(S.loadingMsg||'AI読み取り中...')}</div>
    <div class="loading-sub">${h(S.loadingPhase||'しばらくお待ちください')}</div>
    <div class="prog-track"><div class="prog-fill shimmer" id="prog-bar" style="width:${S.progress||0}%"></div></div>
    <div class="loading-steps">
      ${steps.map(p=>{const done=(ph==='ocr'&&p.k==='read')||(ph==='match'&&p.k!=='match'),act=p.k===ph;return`<div class="lstep ${done?'done':act?'active':''}"><i class="ti ${done?'ti-circle-check':act?'ti-loader-2':'ti-circle'}${act?' spin-ico':''}" style="font-size:16px;"></i>${p.lbl}</div>`;}).join('')}
    </div>
  </div>`;
}

/* =========================================================================
   STEP 4: 完了
   ========================================================================= */
function step4(){
  const confirmedCount=S.items.filter((it,i)=>!it._deleted&&S.confirmed[i]).length;
  const heldCount=S.items.filter((it,i)=>!it._deleted&&!S.confirmed[i]).length;
  const celebrate=S._step4celebrate;
  if(celebrate){S._step4celebrate=false;setTimeout(fireConfetti,120);}
  return `<div class="card done-wrap${celebrate?' celebrate':''}">
    <div class="done-icon"><i class="ti ti-circle-check" style="font-size:32px;"></i></div>
    <div class="done-title">登録が完了しました！</div>
    <div class="done-sub">${confirmedCount}件の発注情報がSOデータとして登録されました</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-num">${confirmedCount}</div><div class="done-lbl">登録件数</div></div>
      <div class="done-stat"><div class="done-num" style="color:var(--txt2);">${h(S.torihiki?.name||'—')}</div><div class="done-lbl">取引先</div></div>
      <div class="done-stat"><div class="done-num" style="font-size:18px;color:var(--txt2);">${h(S.nohinbi)}</div><div class="done-lbl">納品日</div></div>
    </div>
    ${heldCount>0?`<p style="font-size:13px;color:#b45309;margin-bottom:20px;background:#fdf3ec;padding:10px 16px;border-radius:8px;display:inline-block;"><i class="ti ti-clock-pause" style="font-size:14px;vertical-align:-2px;margin-right:5px;"></i>${heldCount}件は保留中です。管理者が原体マスターに登録後、再度読み込んでください</p><br>`:''}
    <div class="done-btns">
      <button class="btn btn-primary" onclick="resetApp();"><i class="ti ti-plus" style="font-size:16px;"></i> 新しい注文書を入力</button>
      <button class="btn btn-ghost" onclick="openHistory()"><i class="ti ti-list-details" style="font-size:16px;"></i> 受注一覧を確認</button>
    </div>
  </div>`;
}

// 軽いキラキラ演出（流れ星＋スパークルがサッと出る）
function fireConfetti(){
  const layer=document.createElement('div');layer.className='sparkle-layer';document.body.appendChild(layer);
  const cx=window.innerWidth/2, cy=window.innerHeight*0.34;
  // 流れ星：中心から数本サッと放射

    star.style.animationDelay=(i*0.04)+'s';
    layer.appendChild(star);
  }
  // スパークル：ふわっと点滅する小さな星
  for(let i=0;i<14;i++){

    s.style.left=(cx+(Math.random()*420-210))+'px';

/* =========================================================================
   ファイル処理
   ========================================================================= */
function detectFT(f){const n=f.name.toLowerCase(),t=f.type;if(t.startsWith('image/')||/\.(jpg|jpeg|png|gif|webp|bmp)$/.test(n))return'image';if(t==='application/pdf'||n.endsWith('.pdf'))return'pdf';if(t.includes('spreadsheet')||/\.(xlsx|xls)$/.test(n))return'excel';return'csv';}
function rdB64(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=j;fr.readAsDataURL(f);});}
function rdAB(f){return new Promise((r,j)=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=j;fr.readAsArrayBuffer(f);});}

// 文字コード自動判定（日本語業務CSVはSHIFT-JIS/CP932が多い）
function decodeBuffer(ab){
  const bytes=new Uint8Array(ab);
  // UTF-8 BOM
  if(bytes[0]===0xEF&&bytes[1]===0xBB&&bytes[2]===0xBF){
    return new TextDecoder('utf-8').decode(ab);
  }
  // 厳密UTF-8として試行 → 失敗ならSHIFT-JIS
  try{
    return new TextDecoder('utf-8',{fatal:true}).decode(ab);
  }catch(e){
    try{return new TextDecoder('shift-jis').decode(ab);}
    catch(e2){
      try{return new TextDecoder('euc-jp').decode(ab);}
      catch(e3){return new TextDecoder('utf-8').decode(ab);}
    }
  }
}
async function rdTxt(f){const ab=await rdAB(f);return decodeBuffer(ab);}

async function handleFile(file){
  S.file=file;S.fileType=detectFT(file);S.fileInfo={name:file.name,size:file.size};S.pdfThumb=null;S.excelPreview=null;S.showText=false;
  try{
    if(S.fileType==='image'){const b64=await rdB64(file);S.filePreview=b64;S.fileBase64=b64.split(',')[1];S.fileMime=file.type;}
    else if(S.fileType==='pdf'){
      S.fileAB=await rdAB(file);
      if(typeof pdfjsLib!=='undefined'){try{const pdf=await pdfjsLib.getDocument({data:new Uint8Array(S.fileAB.slice(0))}).promise;S.fileInfo.pages=pdf.numPages;const page=await pdf.getPage(1);const vp=page.getViewport({scale:0.8});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;S.pdfThumb=canvas.toDataURL('image/jpeg',0.7);}catch(e){}}
    }else if(S.fileType==='excel'){
      S.fileAB=await rdAB(file);
      if(typeof XLSX!=='undefined'){try{const wb=XLSX.read(S.fileAB,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});S.fileInfo.rows=rows.length;S.fileInfo.cols=rows[0]?.length||0;S.excelPreview=rows.slice(0,6);}catch(e){}}
    }else{
      S.text=await rdTxt(file);
      try{const r=Papa.parse(S.text,{header:true,skipEmptyLines:true});S.fileInfo.rows=r.data.length;S.fileInfo.cols=r.meta?.fields?.length||0;S.csvIsSelf=isSelfFormatCSV(r.meta?.fields||[]);S.excelPreview=[[...(r.meta?.fields||[])], ...(r.data.slice(0,5).map(row=>(r.meta?.fields||[]).map(f=>row[f]||'')))].slice(0,6);}catch(e){S.csvIsSelf=false;}
    }
  }catch(e){console.error(e);}

}

  }catch(e){
    // API呼び出し失敗（ローカルファイル実行時のCORS/認証など）→ デモデータにフォールバック

}

/* =========================================================================

function buildNameMatchPrompt(unresolvedNames){
  const mj=JSON.stringify(M.shohintaiko.map(s=>({id:s.id,name:s.name})));
  return `あなたは青果卸の「商品マスター名寄せ」専門AIです。
他社が当社と同じスマートシステムから出力したCSV（列構造は当社と同一）を、当社の仕入データとして取り込みます。
問題は、同じ品目でも会社ごとに登録名がバラバラなことです（漢字/ひらがな/カタカナ、外来語、略称、表記ミス）。
受領した「原体名」を、当社の商品台帳の品目に対応付け（名寄せ）してください。

【当社の商品台帳（対応先の候補）】
${mj}

【受領した原体名（重複除去済み・この全件を必ず返すこと）】
${JSON.stringify(unresolvedNames)}

【名寄せルール】
1) 同一の販売品目なら表記が違っても対応付ける：
   ・漢字/かな/カナ：胡瓜=きゅうり=キュウリ、茄子=なす、人参=にんじん、馬鈴薯=じゃがいも
   ・外来語/別名：ぶどう=グレープ、パクチー=香菜、レモン=檸檬、とうもろこし=コーン
   ・略称：イタリアパセリ=イタパセ、スナップエンドウ=スナップ、きぬさや=サヤ、メークイン=メーク
   ・表記ミス/長音ゆれ：アボガド=アボカド、キュウイ=キウイ、ゴ－ヤ=ゴーヤ
   ・産地/等級の付記は無視：ニンニク国産=にんにく、玉ねぎ(国産)=玉ねぎ
2) ★別物は絶対に統合しない（誤マージ厳禁・最重要）：
   ・こんにゃく≠にんにく、しょうが≠みょうが、セロリ≠パセリ、メロン≠メンマ、タイム≠ライム
   ・ねぎ類は全て別物：長ねぎ/青ねぎ/小ねぎ/玉ねぎ/万能ねぎ/九条ねぎ
   ・トマト類は別物：トマト/ミニトマト/プチトマト/フルーツトマト/アメーラ

   ・部位/加工違いは別品目：にんにく≠ニンニクの芽≠ムキニンニク

async function runSelfCsvImport(){
  S.readMode='self';
  S.loadingMsg='自社フォーマットを解析中...';S.loadingPhase='CSVを読み込み中';render();
  // 1) CSV → 行
  let rows=[];
  try{const parsed=Papa.parse(S.text||'',{header:true,skipEmptyLines:true});rows=parsed.data||[];}catch(e){rows=[];}
  setP(20);
  const mi=buildMasterIndex(M.shohintaiko);
  // 2) ユニークな原体名を抽出
  const uniq=[...new Set(rows.map(r=>String(r['原体名']||'').trim()).filter(Boolean))];
  S.loadingPhase=`${uniq.length}品目を名寄せ中（自動照合）`;render();setP(35);
  // 3) クライアント側で即時照合（Tier1+2）
  const resolved={};const unresolved=[];
  uniq.forEach(n=>{
    if(isNonProduct(n)){resolved[n]={nonProduct:true};return;}
    const m=clientMatch(n,mi);
    if(m)resolved[n]=m;else unresolved.push(n);
  });
  // 4) 残りをAIへバッチ送信（Tier3）
  let aiMap={};S.aiUnavailable=false;
  if(unresolved.length){
    S.loadingPhase=`AIが ${unresolved.length} 品目を意味照合中`;render();setP(50);
    try{
      const res=await callExtractAPI(buildNameMatchPrompt(unresolved),[]);
      (res?.mappings||[]).forEach(mp=>{if(mp&&mp.received!=null)aiMap[String(mp.received)]=mp;});
    }catch(e){/* AI不可（ローカル等）→ Tier1/2の結果は有効。未一致は新規候補として扱う */ S.aiUnavailable=true;}
  }
  setP(70);
  // 5) 名寄せ表（ユニーク単位）を構築
  S.nameMap=uniq.map(n=>{
    const r=resolved[n];
    if(r&&r.nonProduct)return {received:n,matched_id:null,matched_name:null,confidence:'none',via:'non_product',is_non_product:true};
    if(r&&r.master)return {received:n,matched_id:r.master.id,matched_name:r.master.name,confidence:r.confidence,via:r.via};
    const a=aiMap[n];
    if(a&&a.is_non_product)return {received:n,matched_id:null,matched_name:null,confidence:'none',via:'non_product',is_non_product:true,reason:a.reason};
    if(a&&a.matched_id){const m=M.shohintaiko.find(s=>s.id==a.matched_id);return {received:n,matched_id:a.matched_id,matched_name:m?m.name:(a.matched_name||''),confidence:a.confidence||'medium',via:'ai',reason:a.reason};}
    return {received:n,matched_id:null,matched_name:null,confidence:'none',via:a?'ai':'unmatched',reason:a?a.reason:'',is_non_product:false};
  });
  const nm={};S.nameMap.forEach(x=>nm[x.received]=x);
  // 6) 全行を明細へ展開
  S.skippedNonProduct=0;
  S.items=rows.map(r=>selfRowToItem(r,nm,mi)).filter(Boolean);
  setP(100);
}

function selfRowToItem(r,nm,mi){
  const name=String(r['原体名']||'').trim();
  if(!name)return null;
  const map=nm[name]||{};
  if(map.is_non_product){S.skippedNonProduct++;return null;}   // 送料等は明細から除外
  const master=map.matched_id?M.shohintaiko.find(s=>s.id==map.matched_id):null;
  const sh=master?{id:master.id,name:master.name}:null;
  const keijou=cleanKeijou(r['形状大きさ等'],name);
  const sanchi=cleanSanchi(r['産地']);
  const suryo=toNum(r['注文数量']);
  const kakaku=toNum(r['単価']);
  const yoryo=toNum(r['注文容量'])||1;
  const irisu=toNum(r['入数'])||null;
  let kingaku=toNum(r['税抜金額']);
  if(!kingaku&&suryo&&kakaku)kingaku=(yoryo>1?suryo*kakaku*yoryo:suryo*kakaku);
  const origParts=[name,r['形状大きさ等'],r['産地'],(r['注文数量']||'')+(r['注文単位']||''),(r['単価']?'@'+r['単価']:'')].map(x=>String(x||'').trim()).filter(Boolean);
  return {
    original:origParts.join(' '),
    hizuke:String(r['納品日']||'').trim(),
    jan_code:'',
    shohintaiko:sh,
    genkei:sh?sh.name:name,
    receivedName:name,                 // ★名寄せ：受領した元の名前
    nameVia:map.via||'unmatched',      // exact|alias|ai|unmatched
    nameConf:map.confidence||'none',
    nameReason:map.reason||'',
    sanchi:sanchi,
    keijou:keijou,
    suryo:suryo,
    tani:String(r['注文単位']||'').trim()||master?.tani||'ケース',
    chumon_yoryo:yoryo,
    chumon_yoryo_tani:String(r['入数単位']||'').trim()||'kg',
    kakaku:kakaku,
    priceFromMaster:false,
    kingaku:kingaku,
    amountMismatch:false,
    kubun:(String(r['納品区分']||'').trim()==='9')?'無償品':'通常納品',
    irisu_suryo:irisu,
    irisu_tani:String(r['入数単位']||'').trim(),
    shouhizei:parseTaxRate(r['消費税率']),
    keitai_kubun:'通常',gaisou_kubun:'ダンボール',
    confidence:map.confidence||'none',
    field_confidence:{},
    suggestedName:name
  };
}

- 発注書（単価・金額がなく、JANコードと発注数量のみの場合あり）

【消費税率の判定】
- 青果（野菜・果実）は軽減税率8%が基本
- 「#」「[#]」マークの行、または注記で標準税率とされた行は10%
- 「※」印は軽減税率(8%)対象の注記であることが多い
- 不明な場合は8%

【抽出する項目（各明細行ごと）】
- original: 元の記載内容（その行をそのままコピー）
- hizuke: 日付（"MM/DD"形式、納品日/店着日など。あれば）
- jan_code: JANコード/発注コード（あれば文字列、なければ空文字）
- shohintaiko_id: 商品台帳ID（JANコードか商品名で明確に一致する場合のみ。曖昧/該当なしはnull）
- shohintaiko_name: 商品名
- genkei: 原体名（商品台帳から推定、なければ商品名）
- sanchi: 産地（記載なしなら空文字。任意項目）
- keijou: 形状・大きさ（等級・階級・規格・サイズを統合。記載なしなら空文字）
- suryo: 数量（数値）
- tani: 注文単位（"箱""ケース""kg""個""本""束""玉""袋"等。入数単位列があればそれ。不明なら"ケース"）
- chumon_yoryo: 注文容量（1単位あたりの内容量の数値。例"15kg"なら15。なければnull）
- chumon_yoryo_tani: 注文容量の単位（例"kg""g"。なければ空文字）
- kakaku: 単価（円、数値、税抜）。発注書で記載がなければ null
- kingaku: 金額（円、数値。記載があれば。マイナスもそのまま。なければnull）
- kubun: "通常納品" または "無償品"（サンプル/代替品/※注記等で判断。不明なら"通常納品"）
- irisu_suryo: 入数（数値。記載なしならnull）
- irisu_tani: 入数の単位（"個""玉""本"等。不明なら空文字）
- shouhizei: 消費税率（8 または 10）
- field_confidence: 各フィールドの確信度マップ {"keijou":"high"|"medium"|"missing", ...}
- overall_confidence: "high"|"medium"|"none"（商品台帳との照合確信度）

【ルール】
1. 商品台帳に該当しない商品は shohintaiko_id=null, overall_confidence="none"（新規登録対象）
2. JANコードが商品台帳のjanと一致したら overall_confidence="high"（最も確実な照合）
3. 産地・入数・注文容量・単価(発注書時)は任意/欠落OK。記載なしは空文字/null
4. 同じ商品でも形状違い・産地違いは別行として扱う（例：ミカン愛媛Mとミカン熊本Lは別行）
5. 「日計」「小計」「合計」「ページ計」「*」などの集計行・空行は除外
6. 単価が税込みでもそのまま記載（税抜換算しない）
7. 末端名（納品先工場名等）は商品名ではないので、原体名/商品名の方を商品として抽出
8. 説明文は一切不要。JSONのみを返す

【出力JSON形式】
{
  "nohinbi": "YYYY-MM-DD",
  "document_type": "請求書|納品書|発注書|売渡票",
  "issuer": "発行元の会社名（例：株式会社花徳）",

// バックエンド（/api/ai-extract）経由でClaude APIを呼び出す。
// ※ APIキーはサーバー側(.env.local)に保持。ブラウザから直接Anthropic APIは叩かない。
async function callExtractAPI(prompt,images){
  const res=await fetch('/api/ai-extract',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt,images:images||[]})
  });
  if(!res.ok){
    let msg=`APIエラー (${res.status})`;
    try{const e=await res.json();msg=e.error||msg;}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  if(!data||!data.result)throw new Error('AIからの応答が空でした');
  return data.result;
}

function normalizeItem(raw){
  const suryo=raw.suryo||0;
  // 原体（商品）マッチ（JANコード優先 → ID → 名前の名寄せ）
  let sh=null;
  if(raw.shohintaiko_id){const m=M.shohintaiko.find(s=>s.id==raw.shohintaiko_id);if(m)sh={id:m.id,name:m.name,_master:m};}
  if(!sh&&raw.jan_code){const m=M.shohintaiko.find(s=>s.jan&&s.jan===raw.jan_code);if(m)sh={id:m.id,name:m.name,_master:m};}
  // 名前ベースの名寄せ（AIがID未指定でも、正規化キー/別名辞書で確実な一致を拾う）
  let nameVia=null;
  if(!sh){
    const cand=raw.shohintaiko_name||raw.genkei||'';
    if(cand){const mi=window.__mi||(window.__mi=buildMasterIndex(M.shohintaiko));const cm=clientMatch(cand,mi);if(cm){sh={id:cm.master.id,name:cm.master.name,_master:cm.master};nameVia=cm.via;}}
  }
  // 原体名: マスター一致ならその名、なければAI抽出の商品名
  const genkei=sh?sh.name:(raw.shohintaiko_name||raw.genkei||'');
  // 単価: 発注書等で記載がなければ商品台帳のマスター価格で補完
  let kakaku=raw.kakaku||0;
  let priceFromMaster=false;
  if((!kakaku||kakaku<=0)&&sh?._master?.kakaku){kakaku=sh._master.kakaku;priceFromMaster=true;}
  // 形状・大きさ: 必須だが無ければ"-"を自動補完（ブロックしない）
  const keijou=(raw.keijou&&String(raw.keijou).trim())?raw.keijou:'-';
  // 注文単位: 無ければマスター単位 or "ケース"
  const tani=raw.tani||sh?._master?.tani||'ケース';
  // 注文容量: 無ければ1
  const yoryo=raw.chumon_yoryo||1;
  // 金額: 記載があればそれ、なければ数量×単価（×容量）
  let kingaku=(raw.kingaku!==null&&raw.kingaku!==undefined)?raw.kingaku:0;
  if(!kingaku&&suryo&&kakaku){kingaku=yoryo>1?suryo*kakaku*yoryo:suryo*kakaku;}
  // 検算: 数量×単価 または 数量×単価×容量 のどちらかが金額と一致するか
  let amountMismatch=false;
  if(kingaku>0&&kakaku>0&&suryo>0){
    const calc1=suryo*kakaku;
    const calc2=yoryo>1?suryo*kakaku*yoryo:null;
    const ok1=Math.abs(kingaku-calc1)<=Math.max(1,calc1*0.03);
    const ok2=calc2?Math.abs(kingaku-calc2)<=Math.max(1,calc2*0.03):false;
    amountMismatch=!(ok1||ok2);
  }
  if(sh)delete sh._master;
  return {
    original:raw.original||'',
    hizuke:raw.hizuke||'',
    jan_code:raw.jan_code||'',
    shohintaiko:sh,           // マスター紐付け（原体マスターのID）。null=未登録
    genkei:genkei,            // 原体名（=商品名。白菜等）必須
    receivedName:raw.shohintaiko_name||raw.genkei||'',  // 読み取った元の名前
    nameVia:nameVia||(raw.shohintaiko_id?'ai':(sh?'jan':'unmatched')),
    nameConf:sh?(nameVia==='exact'||nameVia==='alias'?'high':(raw.overall_confidence||'medium')):'none',
    sanchi:raw.sanchi||'',
    keijou:keijou,
    suryo:suryo,
    tani:tani,
    chumon_yoryo:yoryo,
    chumon_yoryo_tani:raw.chumon_yoryo_tani||'kg',
    kakaku:kakaku,
    priceFromMaster:priceFromMaster,
    kingaku:kingaku,
    amountMismatch:amountMismatch,
    kubun:raw.kubun||'通常納品',
    irisu_suryo:raw.irisu_suryo||null,
    irisu_tani:raw.irisu_tani||'',
    shouhizei:raw.shouhizei||8,
    keitai_kubun:'通常',
    gaisou_kubun:'ダンボール',
    confidence:sh&&raw.jan_code?'high':(raw.overall_confidence||'medium'),
    field_confidence:raw.field_confidence||{},
    suggestedName:raw.shohintaiko_name||raw.genkei||raw.original?.split(/\s|　/)[0]||''
  };
}

async function extractPdfText(ab){
  if(typeof pdfjsLib==='undefined')return'';let text='';
  try{const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab.slice(0))}).promise;const max=Math.min(pdf.numPages,8);
    for(let i=1;i<=max;i++){const page=await pdf.getPage(i);const c=await page.getTextContent();text+=c.items.map(it=>it.str).join(' ')+'\n\n';}
  }catch(e){console.error(e);}
  return text.trim();
}

async function pdfToImages(ab){
  const imgs=[];if(typeof pdfjsLib==='undefined')return imgs;
  try{const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab.slice(0))}).promise;const mx=Math.min(pdf.numPages,3);
    for(let i=1;i<=mx;i++){S.loadingPhase=`ページ ${i}/${pdf.numPages} を画像化`;render();
      const page=await pdf.getPage(i);const vp=page.getViewport({scale:2.0});
      const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      imgs.push(canvas.toDataURL('image/jpeg',0.85).split(',')[1]);}
  }catch(e){console.error(e);}
  return imgs;
}

/* グリッド行のドラッグ&ドロップ並べ替え（PCグリッド） */
function bindDrag(){
  const grips=document.querySelectorAll('.rn-grip');
  if(!grips.length)return;
  const tbody=document.querySelector('.xl-grid tbody');
  if(!tbody)return;
  let dragIdx=null,ghost=null,indicator=null,curTo=null;

  const getRows=()=>[...tbody.querySelectorAll('tr.r[data-idx]')];

  grips.forEach(grip=>{
    grip.addEventListener('mousedown',startDrag);
    grip.addEventListener('touchstart',startDrag,{passive:false});
  });

  function startDrag(e){
    e.preventDefault();
    const grip=e.currentTarget;
    dragIdx=parseInt(grip.dataset.idx);
    const srcRow=tbody.querySelector(`tr.r[data-idx="${dragIdx}"]`);
    if(!srcRow)return;
    srcRow.classList.add('dragging-src');
    // ドラッグ中インジケーター（挿入位置の緑ライン）
    indicator=document.createElement('div');indicator.className='drag-indicator';document.body.appendChild(indicator);
    document.body.classList.add('dragging-active');
    const move=(ev)=>{
      const y=(ev.touches?ev.touches[0].clientY:ev.clientY);
      const rows=getRows();
      let to=rows.length;
      for(let i=0;i<rows.length;i++){
        const r=rows[i].getBoundingClientRect();
        if(y<r.top+r.height/2){to=parseInt(rows[i].dataset.idx);break;}
      }
      curTo=to;
      // インジケーター位置
      let lineY;
      if(to>=rows.length){const last=rows[rows.length-1].getBoundingClientRect();lineY=last.bottom;}
      else{const tr=tbody.querySelector(`tr.r[data-idx="${to}"]`).getBoundingClientRect();lineY=tr.top;}
      const scroll=document.querySelector('.xl-scroll').getBoundingClientRect();
      indicator.style.top=lineY+'px';
      indicator.style.left=scroll.left+'px';
      indicator.style.width=scroll.width+'px';
      // 自動スクロール（端に近づいたら）
      const sc=document.querySelector('.xl-scroll');
      if(y<scroll.top+40)sc.scrollTop-=12;
      else if(y>scroll.bottom-40)sc.scrollTop+=12;
    };
    const up=()=>{
      document.removeEventListener('mousemove',move);
      document.removeEventListener('mouseup',up);
      document.removeEventListener('touchmove',move);
      document.removeEventListener('touchend',up);
      document.body.classList.remove('dragging-active');
      if(indicator){indicator.remove();indicator=null;}
      srcRow.classList.remove('dragging-src');
      if(curTo!=null&&curTo!==dragIdx&&!(curTo===dragIdx+1)){reorderRow(dragIdx,curTo);}
      else{render();}
      dragIdx=null;curTo=null;
    };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('touchend',up);
  }
}

/* スマホカードのスワイプ：右=登録/確認、左=削除。閾値を超えて離すと実行。 */
function bindSwipe(){
  const wraps=document.querySelectorAll('.mc-wrap');
  // 初回のみ：先頭カードを左右に軽く揺らして「両方向スワイプできる」ことを示す
  if(S._swipeHint&&wraps.length){
    S._swipeHint=false;
    const first=wraps[0].querySelector('.mc');
    if(first){setTimeout(()=>{
      first.style.transition='transform .45s cubic-bezier(.34,1.3,.5,1)';
      first.style.transform='translateX(60px)';      // 右（登録/確認）をチラ見せ
      setTimeout(()=>{first.style.transform='translateX(-52px)';},520); // 左（削除）をチラ見せ
      setTimeout(()=>{first.style.transform='translateX(0)';},1040);
      setTimeout(()=>{first.style.transition='';},1500);
    },450);}
  }
  wraps.forEach(wrap=>{
    const card=wrap.querySelector('.mc');
    if(!card)return;
    const idx=parseInt(wrap.dataset.idx);
    const isHold=wrap.dataset.hold==='1';
    const ok=wrap.dataset.ok==='1';
    const rightEnabled=isHold||ok; // 右=登録(hold) or 確認(必須OK)
    let startX=0,startY=0,dx=0,dragging=false,decided=false,horiz=false;
    const EXEC=92; // 実行しきい値
    const setX=(x)=>{card.style.transform=`translateX(${x}px)`;};
    const cleanup=()=>{wrap.classList.remove('sw-dragging','sw-arm-right','sw-arm-left');};
    const reset=()=>{card.style.transition='transform .24s cubic-bezier(.22,.9,.27,1)';setX(0);cleanup();dx=0;};
    card.addEventListener('touchstart',e=>{
      if(e.target.closest('input,select,button,.mc-name-wrap'))return;
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;decided=false;horiz=false;
      card.style.transition='';wrap.classList.add('sw-dragging');
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(!dragging)return;
      dx=e.touches[0].clientX-startX;const dy=e.touches[0].clientY-startY;
      if(!decided){if(Math.abs(dx)>8||Math.abs(dy)>8){decided=true;horiz=Math.abs(dx)>Math.abs(dy);if(!horiz)wrap.classList.remove('sw-dragging');}}
      if(!horiz)return;
      e.preventDefault(); // 横スワイプ確定後は縦スクロール/ページ移動を止める
      if(dx>0&&!rightEnabled)dx=0; // 右が無効な行は右に動かさない
      let x=Math.max(-150,Math.min(150,dx));
      setX(x);
      wrap.classList.toggle('sw-arm-right',x>EXEC);
      wrap.classList.toggle('sw-arm-left',x<-EXEC);
    },{passive:false});
    const onEnd=()=>{
      if(!dragging)return;dragging=false;
      if(horiz&&dx>EXEC&&rightEnabled){
        // 右スワイプ実行：先に0へ戻してから実行（再描画されなくても固まらない）
        card.style.transition='transform .18s ease-out';setX(0);cleanup();
        setTimeout(()=>{ if(isHold)autoRegisterMaster(idx); else confirmItem(idx); },150);
      }else if(horiz&&dx<-EXEC){
        // 左スワイプ実行：削除（左へ送って削除）
        card.style.transition='transform .2s ease-out';setX(-card.offsetWidth);cleanup();
        setTimeout(()=>deleteRow(idx),170);
      }else{
        reset();
      }
      dx=0;
    };
    card.addEventListener('touchend',onEnd);
    card.addEventListener('touchcancel',reset); // 中断時も必ず元へ戻す
  });
}

async function loadScript(src){return new Promise((res)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>{console.warn('Failed:',src);res();};document.head.appendChild(s);});}

async function init(){
  loadHistory();
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js');
    if(typeof pdfjsLib!=='undefined')pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.worker.min.js';
  }catch(e){console.warn('Library load warning:',e);}
  render();
}

// 画面幅がモバイル境界をまたいだら再描画（グリッド↔カード切替）
window._wasMobile=window.innerWidth<=720;
window.addEventListener('resize',()=>{
  const nowMobile=window.innerWidth<=720;
  if(nowMobile!==window._wasMobile){window._wasMobile=nowMobile;if(S.step===3)render();}
});

// Enterキーで各ステップの主ボタンを実行（モーダル中はモーダル側で処理）
document.addEventListener('keydown',(e)=>{
  if(e.key!=='Enter'||e.isComposing)return;       // 日本語変換中(IME)は無視
  if(S.masterModal!=null)return;                   // モーダルはmm-box側で処理
  if(S.step===1){
    if(S.torihiki&&S.nohin){e.preventDefault();S.step=2;render();}
  }else if(S.step===2){
    if(S.file||S.text.trim()){e.preventDefault();runAI();}
  }
  // step3はセル編集が多いためグローバルEnterは無効（登録は2タップ方式）
});
init();
