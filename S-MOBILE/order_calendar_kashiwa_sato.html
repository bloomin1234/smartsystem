/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
  background: #fafafa;
  color: #1a1a1a;
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 15px;
}

/* ── TOPBAR ── */
.topbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  height: 50px;
  background: #0f5132;
  color: #fff;
  z-index: 100;
}
.logo {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  flex: 0 0 auto;
}
.desktop-tabs { display: none; } /* Hidden on mobile */
.topbar-nav {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.topbar-spacer { display: none; }
.nav-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  border-radius: 2px;
  padding: 6px 12px;
  font-size: 15px;
  cursor: pointer;
  min-width: 44px;
  min-height: 36px;
  font-family: inherit;
}
.nav-btn:active { background: rgba(255,255,255,0.3); }
.period-lbl {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  color: rgba(255,255,255,0.95);
  min-width: 80px;
  text-align: center;
}
.print-btn {
  background: #0f5132;
  border: none;
  color: #fff;
  border-radius: 2px;
  padding: 7px 12px;
  font-size: 17px;
  cursor: pointer;
  min-width: 40px;
  min-height: 36px;

  flex: 0 0 auto;
